services:
  db:
    image: postgres:16-alpine
    container_name: evjo-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: evjo
      POSTGRES_DB: evjo
    ports:
      - "5433:5432"
    volumes:
      - evjo-pgdata:/var/lib/postgresql/data

volumes:
  evjo-pgdata:
